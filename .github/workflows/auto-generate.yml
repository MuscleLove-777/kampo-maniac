name: 漢方マニアック - Auto Generate

on:
  schedule:
    # 毎日 JST 12:00 (UTC 3:00)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch blog_engine modules
        run: |
          # blog_engine の共通モジュールをリポジトリに含まれていない場合に取得
          # GitHub Actions では blog_engine ファイルを直接配置する
          MODULES="article_generator.py seo_optimizer.py affiliate.py site_generator.py"
          for module in $MODULES; do
            if [ ! -f "$module" ]; then
              echo "WARNING: $module not found locally. Downloading from blog_engine repo..."
              curl -sSfL "https://raw.githubusercontent.com/MuscleLove-777/blog-engine/main/${module}" -o "$module" 2>/dev/null || echo "SKIP: $module not available from remote"
            fi
          done
          # テンプレートディレクトリも取得
          if [ ! -d "templates" ]; then
            mkdir -p templates
            for tmpl in base.html index.html article.html category.html; do
              curl -sSfL "https://raw.githubusercontent.com/MuscleLove-777/blog-engine/main/templates/${tmpl}" -o "templates/${tmpl}" 2>/dev/null || echo "SKIP: templates/$tmpl not available"
            done
          fi

      - name: Generate article and build site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_and_build.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./output/site

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
